# 「屏幕伴侣」Windows 端 GUI 有变更时自动打包 exe 并更新 Releases 的 latest。
# 触发：推送到默认分支且 screen_relay_client_win.py 有改动，或手动运行。
name: Screen Companion Client (Windows exe)

on:
  push:
    branches: [ master, main ]
    paths:
      - "data/plugins/astrbot_plugin_screen_companion/screen_relay_client_win.py"
      - ".github/workflows/screen-companion-client-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyautogui Pillow pygetwindow pyaudio numpy

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          $script = "data/plugins/astrbot_plugin_screen_companion/screen_relay_client_win.py"
          pyinstaller --onefile --windowed --name "ScreenCompanion-Windows" --noconfirm $script
          if (-not (Test-Path "dist/ScreenCompanion-Windows.exe")) { exit 1 }

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenCompanion-Windows-latest
          path: dist/ScreenCompanion-Windows.exe

  release:
    name: Update latest Release
    runs-on: ubuntu-latest
    needs: build-exe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or update tag screen-companion-client/latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f screen-companion-client/latest ${{ github.sha }}
          git push -f origin screen-companion-client/latest

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: ScreenCompanion-Windows-latest
          path: release-assets

      - name: Remove old exe from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="screen-companion-client/latest"
          for name in $(gh release view "$tag" --json assets --jq '.assets[].name' 2>/dev/null || true); do
            case "$name" in
              *.exe) gh release delete-asset "$tag" "$name" -y || true ;;
            esac
          done
        continue-on-error: true

      - name: Create or update Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: screen-companion-client/latest
          name: 屏幕伴侣 Windows 端推送 (latest)
          body: |
            由 GUI 代码变更自动构建。适用于「屏幕伴侣」插件远程截图 + 麦克风推送。

            **使用步骤**
            1. 下载下方 `ScreenCompanion-Windows.exe` 到 Windows 电脑
            2. 在 AstrBot 插件配置中将「截图来源」设为「远程」并填写「远程截图监听端口」
            3. 双击运行 exe，在界面中填写服务器地址与端口，点击「开始推送」

            详细说明见插件目录内 `README_remote.md`。
          files: release-assets/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
